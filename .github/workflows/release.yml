name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (macOS)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: ${LATEST_XCODE}"
          sudo xcode-select -s "${LATEST_XCODE}"
          xcodebuild -version
          swift --version

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"               # strip leading 'v' → 1.2.3
          APP_VERSION="${VERSION}" APP_BUILD_NUMBER="${GITHUB_RUN_NUMBER}" ./scripts/assemble_app.sh

      - name: Create ZIP archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent "LAN Scanner.app" LanScanner.zip

      # Sign the update ZIP with Sparkle's EdDSA key and update the appcast.
      - name: Sign update and update appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SIZE=$(stat -f%z LanScanner.zip)
          PUB_DATE=$(date -R)

          # Find the sign_update tool from Sparkle's binary artifact
          SIGN_TOOL=$(find .build -name "sign_update" -type f | head -1)

          if [ -z "${SIGN_TOOL}" ]; then
            echo "Warning: sign_update not found, skipping Sparkle signing"
            exit 0
          fi

          # Sign the ZIP — sign_update reads SPARKLE_PRIVATE_KEY from env
          # Output format: sparkle:edSignature="..." length="..."
          SIG_OUTPUT=$(echo "${SPARKLE_PRIVATE_KEY}" | "${SIGN_TOOL}" LanScanner.zip --ed-key-file -)
          ED_SIGNATURE=$(echo "${SIG_OUTPUT}" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)

          DOWNLOAD_URL="https://github.com/Terrormixer3000/lan_scanner/releases/download/${TAG}/LanScanner.zip"

          # Build the new appcast item and insert before </channel>
          awk -v ver="${VERSION}" -v pub="${PUB_DATE}" -v build="${GITHUB_RUN_NUMBER}" \
              -v url="${DOWNLOAD_URL}" -v sig="${ED_SIGNATURE}" -v size="${SIZE}" \
              '/<\/channel>/ {
                print "    <item>"
                print "      <title>Version " ver "</title>"
                print "      <pubDate>" pub "</pubDate>"
                print "      <sparkle:version>" build "</sparkle:version>"
                print "      <sparkle:shortVersionString>" ver "</sparkle:shortVersionString>"
                print "      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>"
                print "      <enclosure url=\"" url "\""
                print "                 sparkle:edSignature=\"" sig "\""
                print "                 length=\"" size "\""
                print "                 type=\"application/octet-stream\"/>"
                print "    </item>"
              }
              { print }' appcast.xml > appcast_new.xml
          mv appcast_new.xml appcast.xml

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git diff --cached --quiet && echo "No appcast changes" && exit 0
          git commit -m "Update appcast for ${GITHUB_REF_NAME}"
          git push origin main

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "LAN Scanner ${{ github.ref_name }}"
          body: |
            ## LAN Scanner ${{ github.ref_name }}

            ### Installation
            1. Download **LanScanner.zip** below.
            2. Unzip and move **LAN Scanner.app** to your `/Applications` folder.
            3. On first launch, right-click the app and choose **Open** to bypass Gatekeeper (the app is ad-hoc signed, but not Developer ID signed or notarized).

            ### Updates
            Future updates will be delivered automatically via the built-in updater (Sparkle).
            You can also check manually via the **LAN Scanner → Check for Updates…** menu.

            ### Requirements
            - macOS 14.0 (Sonoma) or later

            ### Changes
            See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          files: LanScanner.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
